spring:
  datasource:
    url: jdbc:postgresql://${BBDD_URL}}/finanzas_dev
    username: root
    password: ${BBDDD_PASSWORD}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Valida que el Java encaja con el SQL
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8085